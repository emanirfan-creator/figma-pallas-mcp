<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pallas MCP Bridge</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
      min-height: 180px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #cba6f7;
      letter-spacing: 0.04em;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a6e3a1;
      /* green = connected */
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .dot.disconnected {
      background: #f38ba8;
    }

    .dot.running {
      background: #fab387;
    }

    #status-label {
      font-weight: 500;
    }

    .meta {
      font-size: 10px;
      color: #6c7086;
      line-height: 1.6;
    }

    #last-action {
      margin-top: 10px;
      background: #313244;
      border-radius: 6px;
      padding: 6px 8px;
      font-family: "SF Mono", monospace;
      font-size: 10px;
      color: #89dceb;
      min-height: 28px;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h1>🔗 Pallas MCP Bridge</h1>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-label">Waiting for connection…</span>
  </div>
  <div class="meta" style="margin-top: 2px;">
    Queue: <span id="queue-depth">0</span>
  </div>
  <div class="meta" style="margin-top: 10px; display: flex; gap: 4px;">
    <input type="text" id="ws-url" value="ws://localhost:3055"
      style="background: #313244; color: #fff; border: 1px solid #45475a; padding: 4px; border-radius: 4px; width: 100%; font-size: 10px; font-family: monospace;" />
    <button id="btn-connect"
      style="background: #cba6f7; border: none; padding: 0 8px; border-radius: 4px; color: #1e1e2e; font-weight: bold; cursor: pointer; font-size: 10px;">Connect</button>
  </div>
  <div id="last-action">(no action yet)</div>

  <script>
    const dot = document.getElementById("dot");
    const statusLabel = document.getElementById("status-label");
    const queueDepth = document.getElementById("queue-depth");
    const lastAction = document.getElementById("last-action");
    const wsUrlInput = document.getElementById("ws-url");
    const btnConnect = document.getElementById("btn-connect");

    // Load saved URL
    const savedUrl = localStorage.getItem("pallasWsUrl");
    if (savedUrl) wsUrlInput.value = savedUrl;

    // ── WebSocket server (ui.html runs in an iframe with network access) ──
    let ws = null;
    const queue = [];
    let reconnectTimer = null;

    function setStatus(s, q = 0, action = "") {
      dot.className = "dot " + s;
      statusLabel.textContent =
        s === "connected" ? "Connected" :
          s === "running" ? "Running…" :
            "Disconnected — retrying…";
      if (queueDepth) queueDepth.textContent = String(q);
      if (action) lastAction.textContent = action;
    }

    function connectWS() {
      if (ws) {
        ws.onclose = null;
        ws.close();
      }
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      const url = wsUrlInput.value.trim() || "ws://localhost:3055";
      localStorage.setItem("pallasWsUrl", url);

      let server;
      try {
        server = new WebSocket(url);
      } catch (err) {
        setStatus("disconnected");
        return;
      }

      server.addEventListener("open", () => {
        ws = server;
        setStatus("connected");
        // Flush any queued messages
        while (queue.length > 0) {
          const pending = queue.shift();
          server.send(JSON.stringify(pending.msg));
        }
      });

      server.addEventListener("message", (evt) => {
        try {
          const data = JSON.parse(evt.data);
          // Forward to plugin sandbox
          parent.postMessage({ pluginMessage: { type: "ws_message", ...data } }, "*");
          setStatus("running", 0, data.action != null ? data.action : "unknown");
        } catch { }
      });

      server.addEventListener("close", () => {
        ws = null;
        setStatus("disconnected");
        if (!reconnectTimer) {
          reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            connectWS();
          }, 2000);
        }
      });

      server.addEventListener("error", () => server.close());
    }

    // Listen for replies from the plugin code sandbox
    window.addEventListener("message", (evt) => {
      const msg = evt.data && evt.data.pluginMessage;
      if (!msg || msg.type !== "ws_reply") return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          id: msg.id,
          success: msg.success,
          result: msg.result,
          error: msg.error,
        }));
        setStatus("connected", 0, lastAction.textContent);
      }
    });

    // Listen for status updates from the plugin code
    window.addEventListener("message", (evt) => {
      const msg = evt.data && evt.data.pluginMessage;
      if (!msg || msg.type !== "status") return;
      setStatus(msg.status, msg.queueDepth, msg.lastAction);
    });

    // Listen for manual connect clicks
    btnConnect.addEventListener("click", () => {
      connectWS();
    });

    // Note: ui.html cannot directly open a WebSocket server.
    // The MCP server connects TO this plugin if using a Relay.
    // If local, the MCP Node process hosts the Server and this plugin
    // connects TO the MCP node process on localhost.
    connectWS();
  </script>
</body>

</html>
